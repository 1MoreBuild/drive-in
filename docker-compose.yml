services:
  drive-in:
    build: .
    ports:
      - "9090:9090"
    env_file:
      - .env
    restart: unless-stopped

  # Optional: Cloudflare Tunnel for remote access from Tesla
  # Uncomment and set your tunnel token in .env:
  #   TUNNEL_TOKEN=your-cloudflare-tunnel-token
  #
