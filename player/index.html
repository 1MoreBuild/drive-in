<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drive-In Player</title>
  <link rel="stylesheet" href="/src/style.css" />
  <script type="importmap">
    { "imports": { "@libmedia/avplayer": "/lib/avplayer/avplayer.js" } }
  </script>
</head>
<body>
  <div id="app">
    <div id="player-container"></div>

    <!-- Subtitle overlay -->
    <div id="subtitle-overlay"></div>

    <!-- Center button: play/pause/buffering share one container -->
    <button id="btn-center-play" type="button" aria-label="Play/Pause">
      <svg id="center-play" viewBox="0 0 24 24" fill="white" width="36" height="36">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <svg id="center-pause" viewBox="0 0 24 24" fill="white" width="36" height="36">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
      </svg>
      <div id="center-spinner"></div>
    </button>

    <!-- Seek indicators (left/right) -->
    <div id="seek-indicator-left"></div>
    <div id="seek-indicator-right"></div>

    <!-- Playback controls (auto-hide) -->
    <div id="controls">
      <div id="controls-top">
        <button id="btn-back" type="button" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </button>
        <div id="media-title"></div>
      </div>

      <div id="controls-bottom">
        <div id="progress-wrap">
          <div id="progress-bar">
            <div id="progress-played"></div>
          </div>
          <div id="progress-scrubber"></div>
        </div>

        <div id="controls-row">
          <div id="time-display">
            <span id="time-current">0:00</span>
            <span id="time-sep"> / </span>
            <span id="time-duration">0:00</span>
          </div>

          <div id="controls-spacer"></div>

          <button id="btn-audio" type="button" aria-label="Audio Track" class="hidden">
            <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
              <path d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/>
            </svg>
          </button>

          <div id="audio-panel" class="hidden">
            <div id="audio-list"></div>
          </div>

          <button id="btn-subs" type="button" aria-label="Subtitles" class="hidden">
            <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6v-2zm0 4h8v2H6v-2zm10 0h2v2h-2v-2zm-6-4h8v2h-8v-2z"/>
            </svg>
          </button>

          <div id="subs-panel" class="hidden">
            <div id="subs-list"></div>
          </div>

          <button id="btn-volume" type="button" aria-label="Mute/Unmute">
            <svg id="icon-vol-on" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <svg id="icon-vol-off" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Initial status overlay -->
    <div id="overlay">
      <div id="status-screen">
        <h1>DRIVE-IN</h1>
        <p id="status-text">Connecting...</p>
      </div>
      <div id="browse-screen" class="hidden">
        <div id="history-section" class="browse-section hidden">
          <div class="browse-header">Continue Watching</div>
          <div class="browse-row-wrap">
            <button class="browse-arrow left" aria-label="Scroll left"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
            <div id="history-list" class="browse-row"></div>
            <button class="browse-arrow right" aria-label="Scroll right"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>
          </div>
        </div>
        <div id="movies-section" class="browse-section hidden">
          <div class="browse-header">Movies</div>
          <div class="browse-row-wrap">
            <button class="browse-arrow left" aria-label="Scroll left"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
            <div id="movies-list" class="browse-row"></div>
            <button class="browse-arrow right" aria-label="Scroll right"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>
          </div>
        </div>
        <div id="shows-section" class="browse-section hidden">
          <div class="browse-header">TV Shows</div>
          <div class="browse-row-wrap">
            <button class="browse-arrow left" aria-label="Scroll left"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
            <div id="shows-list" class="browse-row"></div>
            <button class="browse-arrow right" aria-label="Scroll right"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>
          </div>
        </div>
        <div id="episodes-section" class="browse-section hidden">
          <div class="browse-header">
            <button id="eps-back" type="button" aria-label="Back to shows">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <span id="eps-show-title"></span>
          </div>
          <div id="episodes-list" class="episodes-grid"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
