name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Build player
        run: npm run build -w player

      - name: Smoke test — server starts
        run: |
          node server/index.js &
          SERVER_PID=$!
          sleep 2
          curl -sf http://localhost:9090/api/status || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID

      - name: Smoke test — CLI help
        run: node cli/bin/drivein.js --help
