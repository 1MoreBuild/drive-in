name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Test and build
        run: npm run check:core

      - name: Verify production pages
        run: test -f player/dist/index.html && test -f player/dist/diag.html && test -f player/dist/metrics.html

      - name: Smoke test — server starts
        run: |
          node server/index.js &
          SERVER_PID=$!
          sleep 2
          curl -sf http://localhost:9090/api/status || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID

      - name: Smoke test — CLI help
        run: node cli/bin/drivein.js --help

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22.22.0
          cache: npm

      - run: npm ci

      - name: Install browser and media dependencies
        run: |
          npx playwright install --with-deps chromium
          sudo apt-get install --yes ffmpeg

      - name: Run product E2E tests
        run: npm run test:e2e

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build production image
        run: docker build --tag drive-in:ci .

      - name: Verify runtime tools and native dependencies
        run: |
          docker run --rm --entrypoint sh drive-in:ci -c '
            node --version
            deno --version
            yt-dlp --version
            node -e "const Database = require(\"better-sqlite3\"); const db = new Database(\":memory:\"); const row = db.prepare(\"select 1 as ok\").get(); if (row.ok !== 1) process.exit(1); db.close();"
          '

      - name: Smoke test production server
        run: |
          CONTAINER_ID=$(docker run --detach --publish 127.0.0.1:9090:9090 drive-in:ci)
          trap 'docker rm --force "$CONTAINER_ID"' EXIT
          for ATTEMPT in $(seq 1 15); do
            if curl --fail --silent http://localhost:9090/api/status; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$CONTAINER_ID"
          exit 1
