name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: dropdown
    id: workspace
    attributes:
      label: Affected workspace
      options:
        - server
        - player
        - cli
        - multiple
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `npm run dev`
        2. Open http://localhost:5173
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: Paste relevant terminal or browser console output
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, tool versions
      placeholder: |
        OS: <name and version>
        Node: <node --version>
        yt-dlp: <yt-dlp --version>
        ffmpeg: <ffmpeg -version>
    validations:
      required: true
